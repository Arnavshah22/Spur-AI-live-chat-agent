version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spur-postgres
    environment:
      POSTGRES_DB: spur_chat
      POSTGRES_USER: spur
      POSTGRES_PASSWORD: spurdev123
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spur -d spur_chat']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spur-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
